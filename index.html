<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Penalty Master</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

<div id="loading">

<h1>PENALTY MASTER</h1>

<div class="loader"></div>

<p>Loading Stadium...</p>

</div>


<div id="menu">

<h1>⚽ PENALTY MASTER ⚽</h1>

<button id="playBtn">
START GAME
</button>

<button id="settingBtn">
SETTINGS
</button>

<button id="scoreBtn">
LEADERBOARD
</button>

<button id="aboutBtn">
ABOUT
</button>

</div>



<div id="game">

<div id="hud">

<div class="left">

<div class="scoreBox">

Gol

<span id="score">

0

</span>

</div>

<div class="lifeBox">

❤️

<span id="life">

5

</span>

</div>

</div>


<div class="right">

<div class="levelBox">

Level

<span id="level">

Easy

</span>

</div>

</div>

</div>




<div id="stadium">

<div id="goal">

<div id="net"></div>

<div id="keeper"></div>

<div id="ball"></div>

</div>

</div>



<div id="controls">

<button class="shoot" data-dir="left">

⬅

</button>

<button class="shoot" data-dir="center">

⬆

</button>

<button class="shoot" data-dir="right">

➡

</button>

</div>



<div id="message">

Shoot!

</div>


</div>



<div id="resultScreen">

<h1 id="resultTitle">

GAME OVER

</h1>

<h2>

Score

<span id="finalScore">

0

</span>

</h2>

<button id="restart">

PLAY AGAIN

</button>

</div>




<audio id="kick">

<source src="assets/sounds/kick.mp3">

</audio>

<audio id="goalSound">

<source src="assets/sounds/goal.mp3">

</audio>

<audio id="saveSound">

<source src="assets/sounds/save.mp3">

</audio>

<audio id="crowdSound" loop>

<source src="assets/sounds/crowd.mp3">

</audio>

<audio id="music" loop>

<source src="assets/sounds/music.mp3">

</audio>

<script src="script.js"></script>

</body>
</html>
